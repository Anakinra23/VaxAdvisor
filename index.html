<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaxAdvisor РФ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --T:#064E3B;--Tm:#059669;--Tl:#D1FAE5;--Tx:#ECFDF5;
  --A:#78350F;--Am:#D97706;--Al:#FEF3C7;
  --R:#7F1D1D;--Rm:#DC2626;--Rl:#FEE2E2;
  --B:#1E3A5F;--Bm:#2563EB;--Bl:#DBEAFE;
  --g1:#F3F4F6;--g2:#E5E7EB;--g3:#D1D5DB;--g4:#9CA3AF;
  --g6:#4B5563;--g7:#374151;--g8:#1F2937;--g9:#111827;
  --fd:'Syne',sans-serif;--fb:'Manrope',sans-serif;
}
body{font-family:var(--fb);background:#F0F4F2;color:var(--g9);font-size:14px;line-height:1.6}
.app{display:grid;grid-template-columns:290px 1fr;min-height:100vh}

/* SIDEBAR */
.sb{background:var(--T);padding:22px 18px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.sb::-webkit-scrollbar{width:3px}.sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.logo-i{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-t{font-family:var(--fd);font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.logo-s{font-size:9px;color:rgba(255,255,255,.4)}
.pt{font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:9px;font-weight:700}
.pr{padding:7px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.pr:last-child{border-bottom:none}
.pl{font-size:8.5px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.25);margin-bottom:2px}
.pv{font-size:12px;font-weight:600;color:#fff}
.pv.e{color:rgba(255,255,255,.18);font-weight:400;font-style:italic;font-size:11px}
.chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.chip{font-size:9.5px;font-weight:500;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:1px 6px;animation:ci .15s ease}
@keyframes ci{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.chip.hl{background:rgba(167,243,208,.15);border-color:rgba(167,243,208,.25);color:#A7F3D0}
.chip.wn{background:rgba(252,211,77,.12);border-color:rgba(252,211,77,.2);color:#FCD34D}
.sb-stats{display:flex;gap:5px;margin-top:12px}
.stat{flex:1;background:rgba(255,255,255,.08);border-radius:6px;padding:6px;text-align:center}
.stat-n{font-family:var(--fd);font-size:17px;font-weight:700;color:#fff}
.stat-l{font-size:8px;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.28)}
.sb-f{margin-top:auto;padding-top:12px;font-size:9.5px;color:rgba(255,255,255,.18);line-height:1.5}

/* MAIN */
.main{padding:22px 26px;max-width:800px}
.ph{margin-bottom:14px}
.ph h1{font-family:var(--fd);font-size:21px;font-weight:700;color:var(--g9);line-height:1.2;margin-bottom:2px}
.ph p{color:var(--g6);font-size:12px}

/* TABS */
.tbar{display:flex;gap:3px;margin-bottom:14px;background:#fff;padding:3px;border-radius:11px;border:1px solid var(--g2)}
.tb{flex:1;padding:7px 8px;font-family:var(--fd);font-size:11.5px;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:all .2s;color:var(--g6);background:transparent;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap}
.tb:hover{color:var(--g8);background:var(--g1)}
.tb.act{background:var(--T);color:#fff;box-shadow:0 2px 8px rgba(6,78,59,.25)}
.tc{display:none}
.tc.act{display:block;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* FORM SECTIONS */
.sec{background:#fff;border-radius:11px;border:1.5px solid var(--g2);margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.sec.hv{border-color:#6EE7B7}
.sh{padding:11px 14px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;transition:background .1s}
.sh:hover{background:var(--g1)}
.si{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.st{font-family:var(--fd);font-size:12px;font-weight:600;color:var(--g8);flex:1}
.sbg{font-size:9px;font-weight:700;background:var(--Tl);color:var(--T);border-radius:20px;padding:1px 6px;display:none}
.sbg.vis{display:inline}
.cv{font-size:10px;color:var(--g4);transition:transform .2s}
.sec.col .cv{transform:rotate(-90deg)}
.sb2{padding:11px 14px}
.sec.col .sb2{display:none}
.sub{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--g4);margin:9px 0 4px;display:flex;align-items:center;gap:4px}
.sub::before{content:'';display:block;width:12px;height:1px;background:var(--g3)}
.sub:first-child{margin-top:0}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fl{display:block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g6);margin-bottom:3px}
input[type="number"],select{width:100%;height:34px;border:1.5px solid var(--g2);border-radius:7px;padding:0 9px;font-family:var(--fb);font-size:13px;font-weight:500;color:var(--g9);background:#fff;appearance:none;transition:border-color .15s,box-shadow .15s;outline:none}
input:focus,select:focus{border-color:var(--Tm);box-shadow:0 0 0 3px rgba(5,150,105,.1)}
.sw{position:relative}
.sw::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--g4);pointer-events:none;font-size:10px}
.ci{display:flex;align-items:flex-start;gap:7px;padding:5px 6px;border-radius:6px;cursor:pointer;transition:background .1s}
.ci:hover{background:var(--g1)}
.ci input[type="checkbox"]{display:none}
.cb{width:14px;height:14px;border-radius:4px;flex-shrink:0;border:1.5px solid var(--g3);display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s;background:#fff}
.ci input:checked+.cb{background:var(--Tm);border-color:var(--Tm)}
.ci input:checked+.cb::after{content:'✓';font-size:9px;color:#fff;font-weight:700}
.ct{font-size:12px;color:var(--g8);line-height:1.4}
.ci input:checked~.ct{color:var(--T);font-weight:600}
.cn{font-size:10px;color:var(--g4);display:block;margin-top:1px}
.tog{display:flex;align-items:center;justify-content:space-between;padding:7px 6px;border-radius:6px;cursor:pointer;transition:background .1s}
.tog:hover{background:var(--g1)}
.tog-t{font-size:12px;color:var(--g8);font-weight:500}
.tr{width:32px;height:18px;border-radius:9px;background:var(--g2);border:1.5px solid var(--g3);position:relative;flex-shrink:0;transition:all .2s;cursor:pointer}
.tr.on{background:var(--Tm);border-color:var(--Tm)}
.th{width:12px;height:12px;border-radius:50%;background:#fff;position:absolute;top:1px;left:1px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tr.on .th{left:15px}

/* BUTTONS */
.btn{width:100%;padding:10px;font-family:var(--fd);font-size:13px;font-weight:700;background:var(--T);color:#fff;border:none;border-radius:9px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{background:#065F46;transform:translateY(-1px);box-shadow:0 4px 12px rgba(6,78,59,.25)}
.btn:disabled{background:var(--g2);color:var(--g4);cursor:not-allowed;transform:none;box-shadow:none}
.btn2{padding:7px 14px;font-family:var(--fd);font-size:11px;font-weight:600;background:#fff;color:var(--g7);border:1.5px solid var(--g2);border-radius:7px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn2:hover{border-color:var(--g4);background:var(--g1)}

/* RESULTS */
.rh{background:var(--T);border-radius:11px;padding:14px 17px;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.rh h2{font-family:var(--fd);font-size:15px;font-weight:700;color:#fff}
.rh p{font-size:10.5px;color:rgba(255,255,255,.5);margin-top:1px}
.rc{display:flex;gap:6px;flex-wrap:wrap}
.rb{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.18)}
.rb.r{background:rgba(167,243,208,.2);color:#A7F3D0}
.rb.o{background:rgba(252,211,77,.2);color:#FCD34D}
.rb.c{background:rgba(252,165,165,.2);color:#FCA5A5}
.gl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--g4);margin:12px 0 5px;display:flex;align-items:center;gap:5px}
.gl::before{content:'';display:block;width:14px;height:1px;background:var(--g3)}
.tyh{display:flex;align-items:center;gap:5px;margin:14px 0 7px}
.tyh:first-child{margin-top:0}
.tyd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tyt{font-family:var(--fd);font-size:12.5px;font-weight:700;color:var(--g8)}
.tyc{font-size:11px;color:var(--g4)}
.vc{background:#fff;border-radius:9px;border:1.5px solid var(--g2);padding:10px 12px;margin-bottom:5px;display:flex;gap:9px;transition:transform .15s,box-shadow .15s;animation:ci2 .2s ease both}
.vc:hover{transform:translateY(-1px);box-shadow:0 3px 9px rgba(0,0,0,.06)}
@keyframes ci2{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:translateX(0)}}
.vc.r{border-left:3px solid var(--Tm)}.vc.o{border-left:3px solid var(--Am)}.vc.c{border-left:3px solid var(--Rm)}
.vi{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.vc.r .vi{background:var(--Tx)}.vc.o .vi{background:var(--Al)}.vc.c .vi{background:var(--Rl)}
.vcc{flex:1;min-width:0}
.vt{display:flex;align-items:flex-start;gap:5px;flex-wrap:wrap;margin-bottom:2px}
.vn{font-weight:600;font-size:12px;color:var(--g9);line-height:1.3}
.vtg{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:1px 6px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.vtg.r{background:var(--Tl);color:var(--T)}.vtg.o{background:var(--Al);color:var(--A)}.vtg.c{background:var(--Rl);color:var(--R)}
.vcal{font-size:8.5px;font-weight:700;background:var(--Bl);color:var(--B);padding:1px 6px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.vd{font-size:10.5px;color:var(--g6);line-height:1.5}
.vno{margin-top:4px;font-size:10.5px;padding:3px 7px;border-radius:5px;background:var(--Al);color:var(--A);line-height:1.4}
.disc{margin-top:14px;padding:9px 12px;background:var(--g1);border-radius:7px;font-size:10.5px;color:var(--g6);line-height:1.5}

/* CALENDAR */
.cleg{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.cli{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--g6)}
.cld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cst{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g4);margin:14px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--g2)}
.cac{background:#fff;border-radius:10px;border:1.5px solid var(--g2);margin-bottom:6px;overflow:hidden}
.cah{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--g1)}
.cab{min-width:62px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:11px;font-weight:700;flex-shrink:0;text-align:center;line-height:1.2;padding:0 6px}
.n0{background:#EDE9FE;color:#4C1D95}.n1{background:#DBEAFE;color:#1E3A5F}
.n2{background:#D1FAE5;color:#064E3B}.n3{background:#FEF3C7;color:#78350F}
.n4{background:#FFEDD5;color:#7C2D12}.n5{background:var(--g1);color:var(--g8)}
.cat{font-size:11.5px;color:var(--g6);flex:1}
.cvx{display:flex;flex-wrap:wrap;gap:4px;padding:8px 12px}
.cv2{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap}
.vm{background:var(--Tx);color:var(--T);border:1px solid #A7F3D0}
.vr{background:#EDE9FE;color:#4C1D95;border:1px solid #DDD6FE}
.va{background:var(--Bl);color:var(--B);border:1px solid #BFDBFE}

/* PATHOLOGY */
.pc{background:#fff;border-radius:11px;border:1.5px solid var(--g2);margin-bottom:7px;overflow:hidden}
.ph2{padding:11px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:background .1s;user-select:none}
.ph2:hover{background:var(--g1)}
.pic{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ptl{font-family:var(--fd);font-size:12px;font-weight:600;color:var(--g8);flex:1}
.pcnt{font-size:10.5px;color:var(--g4);white-space:nowrap}
.pchv{font-size:9px;color:var(--g4);transition:transform .2s;flex-shrink:0}
.pc.cl .pchv{transform:rotate(-90deg)}
.pb{padding:12px 14px;border-top:1px solid var(--g1);display:none}
.pc.op .pb{display:block;animation:fu .2s ease}
.pvr{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--g1)}
.pvr:last-of-type{border-bottom:none}
.pvi{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:var(--Tx)}
.pvn{font-weight:600;font-size:12px;color:var(--g9);margin-bottom:1px}
.pvs{font-size:11px;color:var(--g6);line-height:1.5}
.sch{display:flex;align-items:flex-start;flex-wrap:wrap;gap:2px;margin-top:5px}
.ss{display:flex;align-items:center;gap:2px}
.sn{text-align:center}
.sd{background:var(--Tm);color:#fff;border-radius:20px;font-size:9px;font-weight:700;padding:2px 7px;white-space:nowrap;display:inline-block}
.sd.sr{background:var(--Bm)}.sd.sc{background:var(--Rm)}
.sl{font-size:8.5px;color:var(--g4);display:block;margin-top:1px}
.sln{width:16px;height:2px;background:var(--g3);flex-shrink:0;margin-top:9px}
.pcon{margin-top:8px;padding:6px 9px;background:var(--Rl);border-radius:6px;font-size:11px;color:var(--R);line-height:1.4}
.pnot{margin-top:6px;padding:6px 9px;background:var(--Al);border-radius:6px;font-size:11px;color:var(--A);line-height:1.4}
.es{text-align:center;padding:28px 16px;background:#fff;border-radius:11px;border:1.5px solid var(--g2)}

/* PATHOGEN TAB */
.ptc{background:#fff;border-radius:11px;border:1.5px solid var(--g2);margin-bottom:8px;overflow:hidden}
.pth{padding:11px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:background .1s;user-select:none}
.pth:hover{background:var(--g1)}
.pthi{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.pttl{font-family:var(--fd);font-size:12.5px;font-weight:600;color:var(--g8);flex:1}
.ptbg{font-size:9.5px;font-weight:600;padding:1px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.ptchv{font-size:10px;color:var(--g4);transition:transform .2s}
.ptc.cl .ptchv{transform:rotate(-90deg)}
.ptb{padding:0 14px 12px;display:none}
.ptc.op .ptb{display:block;animation:fu .2s ease}
.ptdesc{font-size:11.5px;color:var(--g6);line-height:1.5;margin-bottom:10px;padding:8px 10px;background:var(--g1);border-radius:7px}
.vxtb{width:100%;border-collapse:collapse;font-size:11.5px}
.vxtb th{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g4);text-align:left;padding:5px 8px;border-bottom:2px solid var(--g2)}
.vxtb td{padding:7px 8px;border-bottom:1px solid var(--g1);vertical-align:top;line-height:1.4}
.vxtb tr:last-child td{border-bottom:none}
.vxtb tr:hover td{background:var(--g1)}
.vxn{font-weight:600;color:var(--g9)}
.vxm{color:var(--g6);font-size:10.5px}
.vtbg{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;white-space:nowrap;margin-bottom:2px}
.vtbg.live{background:#FEE2E2;color:#7F1D1D}
.vtbg.inact{background:#D1FAE5;color:#064E3B}
.vtbg.rec{background:#DBEAFE;color:#1E3A5F}
.vtbg.combo{background:#EDE9FE;color:#3B1F6A}
.vtbg.oral{background:#FEF3C7;color:#78350F}
.vtbg.mono{background:#FFEDD5;color:#7C2D12}


/* ACTION BUTTONS */
.sec-acts{display:flex;gap:5px;margin-left:auto}
.act-btn{font-size:9.5px;font-weight:600;border:1px solid var(--g3);border-radius:6px;padding:2px 8px;cursor:pointer;background:#fff;color:var(--g6);white-space:nowrap;transition:all .12s;line-height:1.6}
.act-btn:hover{background:var(--g1);border-color:var(--g4)}
.act-btn.grn{border-color:#6EE7B7;color:var(--T);background:var(--Tx)}
.act-btn.grn:hover{background:var(--Tl)}
.act-btn.red{border-color:#FCA5A5;color:var(--R);background:var(--Rl)}
.act-btn.red:hover{background:#FEE2E2}
/* CONTRAINDICATIONS BLOCK */
.pcontra-block{margin-top:8px;padding:8px 10px;background:#FEF2F2;border-left:3px solid var(--Rm);border-radius:0 6px 6px 0;font-size:11px;color:var(--R);line-height:1.6}
.pcontra-block strong{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;color:var(--Rm)}


/* ── МОБИЛЬНЫЙ ГАМБУРГЕР ── */
.mob-header{display:none;align-items:center;gap:10px;padding:12px 16px;background:var(--T);position:sticky;top:0;z-index:150}
.mob-logo{font-family:var(--fd);font-size:14px;font-weight:700;color:#fff;flex:1}
.mob-btn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;padding:0}
.mob-btn span{display:block;width:16px;height:2px;background:#fff;border-radius:2px;transition:all .2s}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:190;backdrop-filter:blur(2px)}
.sb-overlay.on{display:block}

@media(max-width:720px){
  /* Layout */
  .app{grid-template-columns:1fr}
  .sb{position:fixed;top:0;left:0;height:100vh;width:280px;z-index:200;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
  .sb.mob-open{transform:translateX(0)}
  .mob-header{display:flex}
  .main{padding:14px 14px 24px}

  /* Page header */
  .ph h1{font-size:17px}
  .ph p{font-size:11px}

  /* Tab bar — горизонтальный скролл */
  .tbar{gap:2px;padding:3px;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;flex-wrap:nowrap;scrollbar-width:none}
  .tbar::-webkit-scrollbar{display:none}
  .tb{scroll-snap-align:start;font-size:10.5px;padding:7px 9px;white-space:nowrap;flex-shrink:0}

  /* Form sections */
  .sh{padding:10px 12px}
  .sb2{padding:10px 12px}
  .sec-acts{gap:3px}
  .act-btn{font-size:9px;padding:2px 6px}

  /* 2-column → 1-column */
  .r2{grid-template-columns:1fr}

  /* Vaccine cards */
  .vc{padding:9px 10px;gap:8px}
  .vi{width:27px;height:27px;font-size:12px}
  .vn{font-size:11.5px}
  .vd{font-size:10px}

  /* Results header */
  .rh{flex-direction:column;align-items:flex-start;gap:8px;padding:12px 14px}
  .rh h2{font-size:14px}
  .rc{flex-wrap:wrap}
  .rb{font-size:9.5px;padding:2px 7px}

  /* Calendar cards */
  .cah{flex-wrap:wrap;gap:6px;padding:8px 11px}

  .cv2{font-size:10px;padding:2px 7px}

  /* Pathology cards */
  .ph2{padding:10px 12px}
  .ptl{font-size:11.5px}
  .pcnt{font-size:10px}
  .ptb{padding:10px 12px}
  .ptdesc{font-size:11px;padding:6px 8px}
  .pcontra-block{font-size:10.5px;padding:6px 8px}

  /* Pathogen tab */
  .pth{padding:10px 12px}
  .pttl{font-size:11.5px}
  .ptbg{font-size:9px;padding:1px 5px}
  .ptb{padding:10px 12px}
  .vxtb{font-size:10.5px}
  .vxtb th{font-size:8.5px;padding:4px 6px}

/* ══ ANTIBODY ANALYSIS TAB ══ */
.ab-intro{font-size:12px;color:var(--g6);margin-bottom:14px;padding:10px 12px;background:var(--g1);border-radius:8px;line-height:1.5}
.atc{background:#fff;border-radius:11px;border:1.5px solid var(--g2);margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.atc.has-res{border-color:#6EE7B7}
.ath{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .1s}
.ath:hover{background:var(--g1)}
.aticon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.at-info{flex:1;min-width:0}
.atn{font-family:var(--fd);font-size:12.5px;font-weight:600;color:var(--g8);line-height:1.3}
.atu{font-size:10px;color:var(--g4);margin-top:1px}
.at-badge{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;display:none}
.atb{display:none;padding:12px 14px;border-top:1px solid var(--g1)}
.atc.open .atb{display:block;animation:fu .2s ease}
.at-hint{font-size:11.5px;color:var(--g6);line-height:1.5;padding:8px 10px;background:var(--g1);border-radius:7px;margin-bottom:12px}
.at-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g6);margin-bottom:7px}
.at-quant{display:flex;gap:8px;align-items:center}
.at-quant input{flex:1;height:36px;border:1.5px solid var(--g2);border-radius:7px;padding:0 10px;font-family:var(--fb);font-size:14px;font-weight:500;color:var(--g9);outline:none;transition:border-color .15s}
.at-quant input:focus{border-color:var(--Tm);box-shadow:0 0 0 3px rgba(5,150,105,.1)}
.at-unit{font-size:12px;color:var(--g6);white-space:nowrap}
.qbtns{display:flex;gap:6px;flex-wrap:wrap}
.qb{font-size:12px;font-weight:500;border:1.5px solid var(--g2);border-radius:8px;padding:6px 14px;cursor:pointer;background:#fff;color:var(--g7);transition:all .15s}
.qb:hover{background:var(--g1);border-color:var(--g4)}
.qb.q-neg{background:#FEE2E2;border-color:#FCA5A5;color:#7F1D1D;font-weight:600}
.qb.q-eqv{background:#FEF3C7;border-color:#FCD34D;color:#78350F;font-weight:600}
.qb.q-pos{background:#D1FAE5;border-color:#6EE7B7;color:#064E3B;font-weight:600}
.at-go{margin-top:10px;width:100%;padding:9px;font-family:var(--fd);font-size:12.5px;font-weight:700;background:var(--T);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.at-go:hover{background:#065F46;transform:translateY(-1px)}
.at-res{margin-top:12px;border-radius:9px;overflow:hidden;border:1.5px solid}
.at-res-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;flex-wrap:wrap;gap:6px}
.at-res-label{font-family:var(--fd);font-size:13px;font-weight:700}
.at-res-val{font-size:12px;font-weight:600;opacity:.75}
.at-res-bd{padding:10px 12px}
.at-res-desc{font-size:12px;color:var(--g7);line-height:1.5;margin-bottom:8px}
.at-res-rec{font-size:12px;line-height:1.5;padding:7px 10px;background:rgba(0,0,0,.04);border-radius:6px;margin-bottom:7px}
.at-res-vax{font-size:11px;color:var(--g6);display:flex;align-items:center;gap:5px}
.at-ref{margin-top:12px}
.at-ref-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--g4);margin-bottom:6px}
.at-ref-table{width:100%;border-collapse:collapse;font-size:11px}
.at-ref-table td{padding:4px 8px;border-bottom:1px solid var(--g1)}
.at-ref-table tr:last-child td{border-bottom:none}

@media(max-width:720px){
  .atn{font-size:11.5px}
  .qb{font-size:11px;padding:5px 10px}
}
