<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VaxAdvisor РФ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #f5f5f5);
      --text: var(--tg-theme-text-color, #000);
      --hint: var(--tg-theme-hint-color, #999);
      --button: var(--tg-theme-button-color, #3390ec);
      --button-text: var(--tg-theme-button-text-color, #fff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #fff);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      padding: 12px; font-size: 15px; line-height: 1.4;
    }
    .header { text-align: center; padding: 8px 0 16px; }
    .header h1 { font-size: 20px; margin-bottom: 4px; }
    .header p { color: var(--hint); font-size: 13px; }
    .card {
      background: var(--secondary-bg); border-radius: 14px;
      padding: 14px; margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .section-title {
      font-weight: 600; font-size: 16px; margin: 12px 0 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .row { display: flex; gap: 10px; margin-bottom: 10px; }
    .row > * { flex: 1; }
    label { display: block; font-size: 13px; margin: 8px 0 4px; color: var(--hint); }
    input, select, textarea {
      width: 100%; padding: 10px 12px; border-radius: 10px;
      border: 1px solid var(--hint); background: var(--bg);
      color: var(--text); font-size: 14px; outline: none;
    }
    input:focus, select:focus { border-color: var(--button); }
    .checkbox-group label {
      display: flex; align-items: center; gap: 8px;
      margin: 6px 0; font-size: 14px; color: var(--text);
    }
    .checkbox-group input { width: auto; }
    .btn {
      background: var(--button); color: var(--button-text);
      border: none; padding: 14px; border-radius: 12px;
      font-size: 16px; font-weight: 500; width: 100%;
      cursor: pointer; margin: 8px 0;
    }
    .btn:active { opacity: 0.9; }
    .btn-secondary {
      background: var(--secondary-bg); color: var(--text);
      border: 1px solid var(--hint);
    }
    .disclaimer {
      font-size: 11px; color: var(--hint); text-align: center;
      margin-top: 12px; line-height: 1.3;
    }
    .result-item {
      padding: 10px; margin: 6px 0; border-radius: 10px;
      background: var(--bg); border-left: 4px solid var(--button);
    }
    .result-item.important { border-left-color: #ff6b6b; }
    .result-item.yearly { border-left-color: #ffd93d; }
    .tag {
      display: inline-block; padding: 3px 8px; border-radius: 6px;
      font-size: 10px; font-weight: 600; margin-left: 6px;
      background: var(--button); color: var(--button-text);
    }
    .tag.important { background: #ff6b6b; }
    .tag.yearly { background: #ffd93d; color: #333; }
    .hidden { display: none !important; }
    .collapsible { cursor: pointer; user-select: none; }
    .collapsible-content {
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
      background: var(--bg); border-radius: 8px; margin-top: 6px;
    }
    .collapsible.active + .collapsible-content { max-height: 500px; padding: 10px; }
    .arrow { transition: transform 0.2s; display: inline-block; }
    .collapsible.active .arrow { transform: rotate(180deg); }
  </style>
</head>
<body>
  <div class="header">
    <h1>💉 VaxAdvisor РФ</h1>
    <p>30 вакцин · Нацкалендарь · Путешествия</p>
  </div>

  <!-- 👤 Основные параметры -->
  <div class="card">
    <div class="section-title">👤 Параметры</div>
    <div class="row">
      <div>
        <label>Возраст (лет)</label>
        <input type="number" id="age" placeholder="30" min="0" max="120">
      </div>
      <div>
        <label>Пол</label>
        <select id="gender">
          <option value="">—</option>
          <option value="M">Мужской</option>
          <option value="F">Женский</option>
        </select>
      </div>
    </div>
    <label>Регион проживания</label>
    <select id="region">
      <option value="">Не выбран</option>
      <option value="moscow">Москва / ЦФО</option>
      <option value="ural">Урал</option>
      <option value="siberia">Сибирь</option>
      <option value="far_east">Дальний Восток</option>
      <option value="northwest">Северо-Запад</option>
      <option value="povolzhye">Поволжье</option>
      <option value="south">Юг России</option>
    </select>
  </div>

  <!-- 🩺 Заболевания -->
  <div class="card">
    <div class="section-title">🩺 Заболевания</div>
    <div class="checkbox-group">
      <label><input type="checkbox" id="diabetes"> Сахарный диабет</label>
      <label><input type="checkbox" id="lung_disease"> ХОБЛ / астма</label>
      <label><input type="checkbox" id="liver_disease"> Болезни печени</label>
      <label><input type="checkbox" id="kidney_disease"> Болезни почек</label>
      <label><input type="checkbox" id="heart_disease"> Сердечно-сосудистые</label>
      <label><input type="checkbox" id="asplenia"> Аспления / спленэктомия</label>
      <label><input type="checkbox" id="immunodeficiency"> Иммунодефицит</label>
      <label><input type="checkbox" id="hiv"> ВИЧ-инфекция</label>
    </div>
  </div>

  <!-- 🤰 Репродуктивное здоровье -->
  <div class="card">
    <div class="section-title">🤰 Репродуктивное здоровье</div>
    <div class="checkbox-group">
      <label><input type="checkbox" id="pregnancy_planning"> Планирование беременности</label>
      <label><input type="checkbox" id="pregnant"> Текущая беременность</label>
    </div>
  </div>

  <!-- 💼 Профессия -->
  <div class="card">
    <div class="section-title">💼 Профессия</div>
    <div class="checkbox-group">
      <label><input type="checkbox" id="med_worker"> Медработник</label>
      <label><input type="checkbox" id="lab_worker"> Лаборант / учёный</label>
      <label><input type="checkbox" id="vet"> Ветеринар / зоопарк</label>
      <label><input type="checkbox" id="agriculture"> Сельское хозяйство</label>
      <label><input type="checkbox" id="forestry"> Лесник / охотник</label>
      <label><input type="checkbox" id="education"> Педагог / детсад</label>
      <label><input type="checkbox" id="military"> Военнослужащий</label>
    </div>
  </div>

  <!-- ✈️ Путешествия -->
  <div class="card">
    <div class="section-title">✈️ Путешествия</div>
    <div class="checkbox-group">
      <label><input type="checkbox" id="travel_asia"> Южная / ЮВА</label>
      <label><input type="checkbox" id="travel_africa"> Африка / Лат. Америка</label>
      <label><input type="checkbox" id="travel_rabies"> Регионы с бешенством</label>
      <label><input type="checkbox" id="humanitarian"> Гуманитарная миссия</label>
    </div>
  </div>

  <!-- 📋 Анамнез -->
  <div class="card">
    <div class="section-title collapsible" onclick="this.classList.toggle('active')">
      📋 Прививочный анамнез <span class="arrow">▼</span>
    </div>
    <div class="collapsible-content">
      <div class="checkbox-group">
        <label><input type="checkbox" id="vax_bcg"> БЦЖ (туберкулёз)</label>
        <label><input type="checkbox" id="vax_hepb"> Гепатит B</label>
        <label><input type="checkbox" id="vax_mmr"> Корь/Краснуха/Паротит</label>
        <label><input type="checkbox" id="vax_chickenpox"> Ветряная оспа</label>
        <label><input type="checkbox" id="vax_polio"> Полиомиелит</label>
        <label><input type="checkbox" id="vax_hpv"> ВПЧ</label>
        <label><input type="checkbox" id="vax_tbe"> Клещевой энцефалит</label>
        <label><input type="checkbox" id="vax_hepa"> Гепатит A</label>
      </div>
    </div>
  </div>

  <button class="btn" id="calcBtn">💉 Получить рекомендации</button>
  <p class="disclaimer">⚠️ Информационный инструмент. Основан на Приказе Минздрава РФ №1122н, ВОЗ, CDC. Решение принимает лечащий врач.</p>

  <!-- Результаты -->
  <div id="results" class="card hidden">
    <div class="section-title">📋 Рекомендации</div>
    <div id="output"></div>
    <button class="btn btn-secondary" id="editBtn" style="margin-top:12px">← Изменить параметры</button>
  </div>

  <script>
    // === Telegram WebApp Init ===
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      document.body.style.backgroundColor = tg.themeParams.bg_color || '#f5f5f5';
      document.body.style.color = tg.themeParams.text_color || '#000';
    }

    // === Логика приложения ===
    const calcBtn = document.getElementById('calcBtn');
    const editBtn = document.getElementById('editBtn');
    const results = document.getElementById('results');
    const output = document.getElementById('output');

    function getRecommendations() {
      const age = parseInt(document.getElementById('age').value) || 0;
      const gender = document.getElementById('gender').value;
      const region = document.getElementById('region').value;
      
      const recs = [];
      
      // Нацкалендарь (базовый)
      if (age < 18 || !document.getElementById('vax_mmr').checked) {
        recs.push({ name: 'Корь, краснуха, паротит', tag: 'Нацкалендарь', important: false });
      }
      if (!document.getElementById('vax_hepb').checked) {
        recs.push({ name: 'Гепатит B', tag: 'Нацкалендарь', important: false });
      }
      
      // Грипп — ежегодно для всех
      recs.push({ name: 'Грипп', tag: 'Ежегодно', yearly: true });
      
      // Пневмококковая — группы риска
      if (document.getElementById('diabetes').checked || 
          document.getElementById('lung_disease').checked ||
          document.getElementById('heart_disease').checked ||
          age >= 65) {
        recs.push({ name: 'Пневмококковая инфекция', tag: 'Группа риска', important: true });
      }
      
      // Клещевой энцефалит — эндемичные регионы
      if (region === 'ural' || region === 'siberia' || region === 'far_east' || region === 'northwest') {
        if (!document.getElementById('vax_tbe').checked) {
          recs.push({ name: 'Клещевой энцефалит', tag: 'Регион', important: true });
        }
      }
      
      // Гепатит А — поездки, медработники
      if (document.getElementById('travel_asia').checked || 
          document.getElementById('travel_africa').checked ||
          document.getElementById('med_worker').checked) {
        if (!document.getElementById('vax_hepa').checked) {
          recs.push({ name: 'Гепатит A', tag: 'Путешествия', important: false });
        }
      }
      
      // Бешенство — профессии и поездки
      if (document.getElementById('vet').checked || 
          document.getElementById('forestry').checked ||
          document.getElementById('travel_rabies').checked) {
        recs.push({ name: 'Бешенство (до/после экспозиции)', tag: 'Профессия/Путешествия', important: true });
      }
      
      // ВПЧ — до 26 лет, особенно женщинам
      if (age <= 26 && !document.getElementById('vax_hpv').checked) {
        recs.push({ name: 'ВПЧ', tag: 'Нацкалендарь*', important: false });
      }
      
      // Беременность — особые рекомендации
      if (document.getElementById('pregnant').checked) {
        recs.push({ name: 'Коклюш (АДС-М) — 27-36 нед.', tag: 'Беременность', important: true });
        recs.push({ name: 'Грипп — любой триместр', tag: 'Беременность', important: true });
      }
      if (document.getElementById('pregnancy_planning').checked && !document.getElementById('vax_mmr').checked) {
        recs.push({ name: 'Корь/Краснуха — ДО беременности', tag: 'Планирование', important: true });
      }
      
      // Иммунодефицит — дополнительные вакцины
      if (document.getElementById('immunodeficiency').checked || document.getElementById('hiv').checked) {
        recs.push({ name: 'Менингококковая инфекция', tag: 'Иммунодефицит', important: true });
        recs.push({ name: 'Гемофильная инфекция тип B', tag: 'Иммунодефицит', important: true });
      }
      
      return recs;
    }

    function renderResults(recs) {
      if (recs.length === 0) {
        return '<p style="color:var(--hint)">✅ По вашим параметрам все рекомендуемые вакцины уже учтены.</p>';
      }
      return recs.map(r => `
        <div class="result-item ${r.important ? 'important' : ''} ${r.yearly ? 'yearly' : ''}">
          <strong>${r.name}</strong>
          ${r.tag ? `<span class="tag ${r.important ? 'important' : ''} ${r.yearly ? 'yearly' : ''}">${r.tag}</span>` : ''}
        </div>
      `).join('');
    }

    calcBtn.addEventListener('click', () => {
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
      
      const recs = getRecommendations();
      output.innerHTML = renderResults(recs);
      results.classList.remove('hidden');
      calcBtn.classList.add('hidden');
      
      // Показываем MainButton для отправки
      if (tg?.MainButton) {
        tg.MainButton.setText('📤 Отправить результат боту');
        tg.MainButton.show();
      }
    });

    editBtn.addEventListener('click', () => {
      results.classList.add('hidden');
      calcBtn.classList.remove('hidden');
      if (tg?.MainButton) tg.MainButton.hide();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Отправка данных боту
    if (tg?.MainButton) {
      tg.MainButton.onClick(() => {
        const data = {
          age: document.getElementById('age').value,
          gender: document.getElementById('gender').value,
          region: document.getElementById('region').value,
          conditions: {
            diabetes: document.getElementById('diabetes').checked,
            lung_disease: document.getElementById('lung_disease').checked,
            // ... можно добавить все поля
          },
          recommendations: getRecommendations().map(r => r.name)
        };
        tg.sendData(JSON.stringify(data));
      });
    }
  </script>
</body>
</html>
